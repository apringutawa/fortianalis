name: fortianalis-backend
services:
  - name: api
    type: web
    instance_types:
      - name: nano
    scalings:
      min: 1
      max: 1
    health:
      check: http
      path: /health
      port: 8000
    ports:
      - port: 8000
        protocol: http
        routes:
          - path: /
    routes:
      - path: /
    build:
      runtime: python
      root: backend
      commands:
        - pip install -r requirements.txt
    run:
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env:
      - key: GEMINI_API_KEY
        scope: build-and-run
      - key: ALLOWED_ORIGINS
        scope: build-and-run
        value: https://frontend-nine-ruby-67.vercel.app
